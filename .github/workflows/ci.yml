name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    - name: Restore dependencies
      working-directory: ./todoBackend
      run: dotnet restore ./todoBackend/todoBackend.csproj
    - name: Build
      working-directory: ./todoBackend
      run: dotnet build ./todoBackend/todoBackend.csproj -c Release --no-restore

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: ./todo-frontend
      run: npm install
    - name: Build frontend
      working-directory: ./todo-frontend
      run: npm run build